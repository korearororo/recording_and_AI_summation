services:
  - type: web
    name: recording-ai-backend
    runtime: docker
    plan: free
    region: singapore
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: AUTH_PUBLIC_BASE_URL
        value: "https://recording-ai-backend.onrender.com"
      - key: AUTH_MOBILE_REDIRECT_URI
        value: "meetingnoteai://auth/callback"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: KAKAO_CLIENT_ID
        sync: false
      - key: KAKAO_CLIENT_SECRET
        sync: false
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: TRANSCRIBE_MODEL
        value: "gpt-4o-mini-transcribe"
      - key: SUMMARY_MODEL
        value: "gpt-4.1-mini"
      - key: CHAT_TRANSCRIBE_MODEL
        value: "gpt-4.1-mini"
      - key: CHAT_SUMMARY_MODEL
        value: "gpt-4.1-mini"
      - key: TRANSCRIBE_MAX_FILE_MB
        value: "24"
      - key: TRANSCRIBE_CHUNK_MINUTES
        value: "10"
      - key: TRANSCRIBE_CHUNK_BITRATE
        value: "64k"
      - key: TRANSCRIBE_PARALLEL_CHUNKS
        value: "3"
      - key: OPENAI_TIMEOUT_SECONDS
        value: "300"
      - key: OPENAI_MAX_RETRIES
        value: "1"
