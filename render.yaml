databases:
  - name: recording-ai-auth-db
    plan: free
    region: singapore
    databaseName: recording_ai_auth
    user: recording_ai_auth_user

services:
  - type: web
    name: recording-ai-backend
    runtime: docker
    plan: free
    region: singapore
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: LIBRARY_ROOT
        value: "library"
      - key: GOOGLE_DRIVE_ENABLED
        value: "false"
      - key: GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_DRIVE_ROOT_FOLDER_ID
        sync: false
      - key: GOOGLE_DRIVE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_DRIVE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_DRIVE_OAUTH_REFRESH_TOKEN
        sync: false
      - key: JOB_STORE_PATH
        value: "jobs/jobs.json"
      - key: JOB_STORE_MAX_ITEMS
        value: "1000"
      - key: AUTH_DATABASE_URL
        fromDatabase:
          name: recording-ai-auth-db
          property: connectionString
      - key: AUTH_PUBLIC_BASE_URL
        value: "https://recording-ai-backend.onrender.com"
      - key: AUTH_MOBILE_REDIRECT_URI
        value: "meetingnoteai://auth/callback"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: KAKAO_CLIENT_ID
        sync: false
      - key: KAKAO_CLIENT_SECRET
        sync: false
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: TRANSCRIBE_MODEL
        value: "gpt-4o-mini-transcribe"
      - key: SUMMARY_MODEL
        value: "gpt-4.1-mini"
      - key: TRANSLATION_MODEL
        value: "gpt-4.1-mini"
      - key: CHAT_TRANSCRIBE_MODEL
        value: "gpt-4.1-mini"
      - key: CHAT_TRANSLATION_MODEL
        value: "gpt-4.1-mini"
      - key: CHAT_SUMMARY_MODEL
        value: "gpt-4.1-mini"
      - key: TRANSCRIBE_MAX_FILE_MB
        value: "24"
      - key: TRANSCRIBE_CHUNK_MINUTES
        value: "5"
      - key: TRANSCRIBE_CHUNK_BITRATE
        value: "64k"
      - key: TRANSCRIBE_PARALLEL_CHUNKS
        value: "3"
      - key: TRANSCRIBE_FORCE_CHUNKING
        value: "true"
      - key: OPENAI_TIMEOUT_SECONDS
        value: "300"
      - key: OPENAI_MAX_RETRIES
        value: "1"
